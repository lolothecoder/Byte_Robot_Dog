can_relay:
  ros__parameters:
    port: /dev/ttyUSB0
    baud: 2000000

    # Per-joint mapping. Order must match ik_node's output order.
    joint_names:     [hip_abduct, hip_pitch, knee]
    can_node_ids:    [3, 5, 1]
    gear_ratio:      [8.0, 8.0, 8.0]     # motor revs per joint rev (GIM8010-8 = 8:1)
    sign:            [1.0, -1.0, 1.0]    # hip_pitch reversed vs URDF axis
    zero_offset_rev: [0.0, 0.0, 0.0]     # motor-rev reading at URDF joint-zero

    # Safety gates
    dry_run: true                         # start safe: no SET_INPUT_POS, no state changes
    max_joint_rad:    [0.2618, 0.5236, 0.7854]  # ±15°, ±30°, ±45° (cable-limited workspace)
    max_rate_rad_s:   [0.4, 0.4, 2.0]     # hips conservative; knee fast for bench demos
    command_timeout_s: 1.0               # no trajectory for this long -> auto-disarm
    calibration_file: /tmp/byte_leg_calibration.yaml

    # Loop rates. The TX command stream runs in a dedicated thread, so
    # raising state_publish_hz no longer GIL-starves it. With ODrive's
    # encoder_msg_rate_ms = 10 (see byte_leg_hardware/README), encoder
    # frames arrive at ~100 Hz — match that here so we don't discard
    # half of them.
    command_rate_hz:   50.0
    state_publish_hz:  100.0
    diag_publish_hz:   2.0

    # Best-effort SCHED_OTHER niceness for the TX thread. -5 buys a
    # measurable jitter improvement under load. Needs CAP_SYS_NICE or a
    # /etc/security/limits.d entry — see README. Set to 0 to disable.
    tx_nice: -5
