joy_teleop:
  ros__parameters:
    speed_xy: 0.20           # foot velocity (m/s) at full left-stick deflection
    speed_z: 0.15            # foot velocity (m/s) at full right-stick-Y deflection
    decay_time: 0.3          # sec to return ~63% of the way home on RB release
    deadzone: 0.15
    home_pose: [0.0, 0.0, -0.6]      # foot at full extension == URDF-zero, no slew at arm
    workspace_xy: 0.15       # ± m offset cap from home in X/Y
    workspace_z: 0.10        # ± m offset cap from home in Z
    axis_forward: 1
    axis_lateral: 0
    axis_vertical: 4
    button_home: 0
    button_enable: 5
    publish_rate_hz: 50.0
    frame_id: base_link
    target_topic: /foot/target_point

ik_node:
  ros__parameters:
    thigh_length: 0.30
    shank_length: 0.30
    controller_topic: /leg_controller/joint_trajectory
    target_topic: /foot/target_point
    time_from_start: 0.05
    publish_rate_hz: 50.0

joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.05
    autorepeat_rate: 50.0
