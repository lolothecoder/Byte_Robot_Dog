joy_teleop:
  ros__parameters:
    step_amplitude: 0.10     # forward extent of each step (m)
    step_height: 0.06        # vertical foot lift during swing (m)
    step_frequency: 1.2      # gait cycle frequency at full stick (Hz)
    height_speed: 0.15       # right-stick vertical trim rate (m/s)
    decay_time: 0.4          # time to decay step offset to 0 on release (s)
    deadzone: 0.15
    home_pose: [0.0, 0.0, -0.55]
    height_min: -0.15
    height_max: 0.15
    axis_forward: 1
    axis_lateral: 0
    axis_vertical: 4
    button_home: 0
    button_enable: 5
    publish_rate_hz: 50.0
    frame_id: base_link
    target_topic: /foot/target_point

ik_node:
  ros__parameters:
    thigh_length: 0.30
    shank_length: 0.30
    controller_topic: /leg_controller/joint_trajectory
    target_topic: /foot/target_point
    time_from_start: 0.05
    publish_rate_hz: 50.0

joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.05
    autorepeat_rate: 50.0
